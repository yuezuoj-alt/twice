<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <link rel="stylesheet" href="css/bottom-nav.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>提醒日期</title>
  <style>
    :root {
      --bg-page: #f7f2ef;
      --pink-header-from: #fd898a;
      --pink-header-to: #fd9999;
      --pink-accent: #ec7b75;
      --pink-muted: #e8c0b7;
      --pink-primary: #fd898a;
      --nav-bg: #fee0d8;
      --text-secondary: #464646;
      --picker-muted: #ccc;
      --picker-active: #464646;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-page);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .pink-header {
      height: 126px;
      background: linear-gradient(180deg, var(--pink-header-from) 0%, var(--pink-header-to) 100%);
    }

    .profile-card {
      margin: -72px 20px 0;
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(255, 240, 235, 0.15) 49.5%, rgba(233, 221, 217, 0.3) 100%);
      backdrop-filter: blur(32.5px);
      border: 0.8px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 9px 13px rgba(226, 202, 194, 0.3);
      padding: 16px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 42px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-text .name {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .profile-text .address {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 16px;
    }

    .bg-sections {
      padding: 20px 20px 0 54px;
    }

    .bg-section-title {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .bg-card {
      background: #fff;
      border-radius: 20px;
      height: 40px;
      margin-bottom: 3px;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 102px;
      background: var(--nav-bg);
      display: flex;
      justify-content: space-between;
      padding: 16px 30px 34px;
      z-index: 2;
      pointer-events: none;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50px;
    }

    .nav-item .nav-label {
      font-size: 10px;
      color: var(--pink-muted);
    }

    .nav-item.active .nav-label { color: var(--pink-accent); }

    .overlay-mask {
      position: absolute;
      inset: 0;
      z-index: 15;
      cursor: pointer;
    }

    .overlay-mask img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .dialog {
      position: absolute;
      left: 20px;
      top: 265px;
      width: 400px;
      max-width: calc(100% - 40px);
      height: 397px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12.5px);
      -webkit-backdrop-filter: blur(12.5px);
      border-radius: 15px;
      z-index: 30;
      padding: 45px 20px 32px;
      display: flex;
      flex-direction: column;
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .dialog-title {
      font-size: 22px;
      color: #000;
      font-weight: 400;
      line-height: 1.2;
    }

    .preview-badge {
      border: 0.5px solid #ccc;
      border-radius: 3px;
      padding: 0 8px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .preview-badge span {
      font-size: 10px;
      color: #000;
      letter-spacing: 0.35px;
      white-space: nowrap;
      line-height: 20px;
    }

    .wheel-wrap {
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
      height: 126px;
      flex: 1;
    }

    .wheel-wrap::before,
    .wheel-wrap::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 42px;
      z-index: 2;
      pointer-events: none;
    }

    .wheel-wrap::before {
      top: 0;
      background: linear-gradient(180deg, #fff 50%, transparent);
    }

    .wheel-wrap::after {
      bottom: 0;
      background: linear-gradient(0deg, #fff 50%, transparent);
    }

    .wheel-highlight {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 65px;
      height: 42px;
      pointer-events: none;
      z-index: 1;
    }

    .wheel-highlight::before,
    .wheel-highlight::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: #ccc;
    }

    .wheel-highlight::before { top: 0; }
    .wheel-highlight::after { bottom: 0; }

    .day-picker {
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100%;
      padding-top: 20px;
      position: relative;
    }

    .day-picker .col-unit {
      position: absolute;
      right: calc(50% - 52px);
      top: 0;
      font-size: 10px;
      color: #000;
      letter-spacing: 0.35px;
      line-height: 20px;
    }

    .wheel-col {
      width: 65px;
      height: 100%;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .wheel-col::-webkit-scrollbar { display: none; }

    .wheel-item {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      font-size: 16px;
      font-weight: 600;
      color: var(--picker-muted);
      user-select: none;
    }

    .wheel-item.active {
      font-size: 28px;
      color: var(--picker-active);
    }

    .dialog-actions {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }

    .dialog-btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 32px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      line-height: 28px;
    }

    .dialog-btn:active { opacity: 0.85; }

    .dialog-btn.cancel {
      background: #d9d9d9;
      color: #000;
    }

    .dialog-btn.confirm {
      background: var(--pink-primary);
      color: #fff;
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="bg-layer">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="dynamic-island" aria-hidden="true"></div>
        <div class="levels"><img src="images/Levels.png" alt="" class="levels-strip" /></div>
      </div>

      <div class="pink-header"></div>

      <div class="profile-card">
        <div class="profile-info">
          <div class="profile-avatar">
            
          </div>
          <div class="profile-text">
            <p class="name">妈妈小丽</p>
            <p class="address">翻斗大街翻斗花园二号楼1001室</p>
          </div>
        </div>
      </div>

      <div class="bg-sections">
        <p class="bg-section-title">提醒</p>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
        <div class="bg-card"></div>
      </div>
    </div>

        <nav class="bottom-nav" aria-hidden="true">
      <div class="nav-item" data-nav="appointment"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">预约</span></div>
      <div class="nav-item" data-nav="schedule"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">接种时间表</span></div>
      <div class="nav-item" data-nav="growth"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">成长曲线</span></div>
      <div class="nav-item active" data-nav="profile"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">我的</span></div>
    </nav>

    <div class="overlay-mask" id="overlay" aria-hidden="true">
      
    </div>

    <div class="dialog" role="dialog" aria-labelledby="dialogTitle">
      <div class="dialog-header">
        <h2 class="dialog-title" id="dialogTitle">提醒日期</h2>
        <div class="preview-badge">
          <span id="previewDays">提前10天</span>
        </div>
      </div>

      <div class="wheel-wrap">
        <div class="wheel-highlight"></div>
        <div class="day-picker">
          <span class="col-unit">天</span>
          <div class="wheel-col" id="dayCol"></div>
        </div>
      </div>

      <div class="dialog-actions">
        <button class="dialog-btn cancel" type="button" id="cancelBtn">取消</button>
        <button class="dialog-btn confirm" type="button" id="confirmBtn">添加</button>
      </div>
    </div>
  </div>

  <script src="js/system-time.js"></script>
  <script>
    const ITEM_H = 42;
    const DAYS = Array.from({ length: 30 }, (_, i) => i + 1);

    function loadCustomDays() {
      const stored = sessionStorage.getItem("customReminderDays");
      return stored ? parseInt(stored, 10) : 10;
    }

    class VerticalWheel {
      constructor(col, options) {
        this.col = col;
        this.itemHeight = options.itemHeight || ITEM_H;
        this.items = options.items;
        this.defaultIndex = options.defaultIndex || 0;
        this.onChange = options.onChange || (() => {});
        this.scrollTimer = null;
        this.build();
        this.bind();
        requestAnimationFrame(() => {
          this.scrollToIndex(this.defaultIndex, false);
          this.updateActive();
        });
      }

      build() {
        const pad = this.getPadding();
        this.col.style.paddingTop = pad + "px";
        this.col.style.paddingBottom = pad + "px";
        this.col.innerHTML = "";
        this.items.forEach((val) => {
          const el = document.createElement("div");
          el.className = "wheel-item";
          el.textContent = String(val);
          this.col.appendChild(el);
        });
      }

      getPadding() {
        const visible = this.col.clientHeight || 84;
        return Math.max(0, (visible - this.itemHeight) / 2);
      }

      getIndex() {
        const idx = Math.round(this.col.scrollTop / this.itemHeight);
        return Math.max(0, Math.min(this.items.length - 1, idx));
      }

      getValue() {
        return this.items[this.getIndex()];
      }

      scrollToIndex(index, smooth = true) {
        this.col.style.scrollBehavior = smooth ? "smooth" : "auto";
        this.col.scrollTop = index * this.itemHeight;
        if (!smooth) this.col.style.scrollBehavior = "smooth";
      }

      updateActive() {
        const idx = this.getIndex();
        this.col.querySelectorAll(".wheel-item").forEach((el, i) => {
          el.classList.toggle("active", i === idx);
        });
        this.onChange(this.items[idx], idx);
      }

      snap() {
        this.scrollToIndex(this.getIndex());
        setTimeout(() => this.updateActive(), 100);
      }

      bind() {
        this.col.addEventListener("scroll", () => {
          clearTimeout(this.scrollTimer);
          this.updateActive();
          this.scrollTimer = setTimeout(() => this.snap(), 80);
        });

        this.col.addEventListener("wheel", (e) => {
          e.preventDefault();
          this.col.scrollTop += e.deltaY;
        }, { passive: false });

        this.col.addEventListener("touchend", () => {
          setTimeout(() => this.snap(), 50);
        });
      }
    }

    const initialDays = loadCustomDays();
    const previewEl = document.getElementById("previewDays");

    const dayWheel = new VerticalWheel(document.getElementById("dayCol"), {
      items: DAYS,
      defaultIndex: DAYS.indexOf(initialDays),
      onChange: (val) => {
        previewEl.textContent = `提前${val}天`;
      }
    });

    previewEl.textContent = `提前${initialDays}天`;

    function goProfile() {
      window.location.href = "我的.html";
    }

    document.getElementById("overlay").addEventListener("click", goProfile);
    document.getElementById("cancelBtn").addEventListener("click", goProfile);

    document.getElementById("confirmBtn").addEventListener("click", () => {
      sessionStorage.setItem("customReminderDays", String(dayWheel.getValue()));
      sessionStorage.setItem("reminderMode", "custom");
      window.location.href = "我的.html";
    });
  </script>
  <script src="js/bottom-nav.js"></script>
</body>
</html>
