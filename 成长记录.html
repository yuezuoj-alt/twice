<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <link rel="stylesheet" href="css/bottom-nav.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>成长记录</title>
  <style>
    :root {
      --bg-page: #f7f2ef;
      --pink-header-from: #fd898a;
      --pink-header-to: #fd9999;
      --pink-accent: #ec7b75;
      --pink-muted: #e8c0b7;
      --pink-nav: #fee0d8;
      --timeline-dot: #d3d3d3;
      --timeline-line: #d3d3d3;
      --timeline-dot-size: 15px;
      --timeline-dot-top: 4px;
      --timeline-dot-line-gap: 4px; /* 圆点 bottom → 竖线 top */
      --divider: #d9d9d9;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-page);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
    }

    .pink-header {
      flex-shrink: 0;
      height: 205px;
      background: linear-gradient(180deg, var(--pink-header-from) 0%, var(--pink-header-to) 100%);
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }
    .profile-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 20px 0;
    }

    .tab-bar-wrap {
      flex-shrink: 0;
      position: relative;
      padding: 39px 20px 0;
    }

    .tab-bar-bg {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 39px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 240, 235, 0.6) 30%, rgba(255, 240, 235, 0.8) 100%);
      backdrop-filter: blur(32.5px);
      border: 0.8px solid rgba(255, 255, 255, 0.6);
    }

    .tab-bar {
      position: relative;
      display: flex;
      height: 40px;
      align-items: center;
    }

    .tab-item {
      flex: 1;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 16px;
      color: #000;
      cursor: pointer;
      height: 31px;
      margin: 4.5px 0;
      border-radius: 7px;
      position: relative;
      z-index: 1;
    }

    .tab-item.active {
      flex: 0 0 194px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.9) 100%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.1), inset 0 0.5px 0 rgba(255, 255, 255, 0.75);
    }

    .body-area {
      flex: 1;
      background: var(--bg-page);
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 102px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .body-area::-webkit-scrollbar { display: none; }

    .body-fade {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      height: 59px;
      background: linear-gradient(180deg, rgba(241, 241, 241, 0) 0%, rgba(105, 104, 103, 0.05) 100%);
      pointer-events: none;
      z-index: 1;
      margin-bottom: -59px;
    }

    .timeline {
      position: relative;
      padding: 16px 20px 24px 54px;
    }

    .timeline::before {
      display: none;
    }

    .timeline-item--has-record::after {
      content: "";
      position: absolute;
      left: -30px;
      top: calc(var(--timeline-dot-top) + var(--timeline-dot-size) + var(--timeline-dot-line-gap));
      width: 3px;
      height: 122px;
      background: var(--timeline-line);
      border-radius: 6px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: -36px;
      top: var(--timeline-dot-top);
      width: var(--timeline-dot-size);
      height: var(--timeline-dot-size);
      background: var(--timeline-dot);
      border-radius: 6px;
    }

    .age-label {
      font-size: 16px;
      color: #000;
      line-height: 23px;
      margin-bottom: 8px;
    }

    .record-card {
      background: #fff;
      border-radius: 20px;
      padding: 10px 16px 10px 12px;
      min-height: 105px;
    }

    /* 左滑删除 — 与疫苗首页一致 */
    .record-swipe-container {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      min-height: 105px;
    }

    .record-swipe-container .swipe-hide {
      position: absolute;
      right: 0;
      top: 0;
      width: 110px;
      height: 100%;
      min-height: 105px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      background: #fef9e6;
      border-radius: 0 20px 20px 0;
    }

    .record-swipe-container .swipe-hide .hide-icon {
      position: relative;
      z-index: 1;
      width: 36px;
      height: 36px;
      color: #f0ad4e;
      flex-shrink: 0;
    }

    .record-swipe-container .swipe-hide .hide-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .record-swipe-container .swipe-hide-btn {
      position: absolute;
      inset: 0;
      border: none;
      background: none;
      cursor: pointer;
      z-index: 2;
    }

    .record-swipe-container .swipe-panel {
      position: relative;
      z-index: 1;
      transform: translateX(0);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .record-swipe-container .swipe-panel.dragging {
      transition: none;
    }

    .record-swipe-container .swipe-panel.open {
      transform: translateX(-110px);
    }

    .timeline-item.is-removing {
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.22s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .record-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      min-height: 44px;
    }

    .record-row .icon-wrap,
    .growth-icon {
      width: 39px;
      height: 39px;
      flex-shrink: 0;
      position: relative;
    }

    .growth-icon__layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .record-row .label {
      flex: 1;
      font-size: 16px;
      color: #000;
    }

    .record-row .value {
      font-size: 16px;
      font-weight: 500;
      color: #000;
      min-width: 67px;
      text-align: right;
    }

    .record-divider {
      width: 331px;
      height: 1px;
      background: var(--divider);
      margin-left: 19px;
      margin-right: auto;
    }

    .add-card {
      background: #fff;
      border-radius: 20px;
      height: 83px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      width: 100%;
      cursor: pointer;
      font-family: inherit;
    }

    .add-card:active { opacity: 0.85; }

    .add-icon {
      width: 36px;
      height: 36px;
      position: relative;
    }

    .add-icon .bar-h,
    .add-icon .bar-v {
      position: absolute;
      background: #808080;
      border-radius: 20px;
    }

    .add-icon .bar-h {
      width: 36px;
      height: 4px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    .add-icon .bar-v {
      width: 4px;
      height: 36px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 102px;
      background: var(--pink-nav);
      backdrop-filter: blur(11.45px);
      display: flex;
      justify-content: space-between;
      padding: 16px 30px 34px;
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50px;
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
    }

    .nav-item .nav-label {
      font-size: 10px;
      color: var(--pink-muted);
      white-space: nowrap;
    }

    .nav-item.active .nav-label { color: var(--pink-accent); }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
  <script src="js/load-baby-profile-css.js"></script>
</head>
<body>
  <div class="phone">
    <header class="pink-header">
      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="dynamic-island" aria-hidden="true"></div>
        <div class="levels"><img src="images/Levels.png" alt="" class="levels-strip" /></div>
      </div>

      <div class="profile-row" id="profileSwitcher"></div>

      <div class="tab-bar-wrap">
        <div class="tab-bar-bg" aria-hidden="true"></div>
        <div class="tab-bar">
          <button class="tab-item" type="button" data-tab="curve">曲线</button>
          <button class="tab-item active" type="button" data-tab="record">记录</button>
        </div>
      </div>
    </header>

    <main class="body-area">
      <div class="body-fade" aria-hidden="true"></div>

      <div class="timeline" id="growthTimeline"></div>
    </main>

        <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item" data-nav="appointment" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">预约</span></button>
      <button class="nav-item" data-nav="schedule" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">接种时间表</span></button>
      <button class="nav-item active" data-nav="growth" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">成长曲线</span></button>
      <button class="nav-item" data-nav="profile" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">我的</span></button>
    </nav>
  </div>

  <script src="js/system-time.js"></script>
  <script src="js/baby-profile.js"></script>
  <script>
    const NAV_ROUTES = {
      appointment: "index.html",
      schedule: "接种时间表.html",
      growth: "成长曲线.html",
      profile: "我的.html"
    };

    const TAB_ROUTES = {
      curve: "成长曲线.html",
      record: "成长记录.html"
    };

    function initNav() {
      document.querySelectorAll(".nav-item").forEach((item) => {
        item.addEventListener("click", () => {
          const id = item.dataset.nav;
          if (NAV_ROUTES[id] && id !== "growth") {
            window.location.href = NAV_ROUTES[id];
          }
        });
      });
    }

    document.querySelectorAll(".tab-item").forEach((tab) => {
      tab.addEventListener("click", () => {
        const id = tab.dataset.tab;
        if (TAB_ROUTES[id] && id !== "record") {
          window.location.href = TAB_ROUTES[id];
        }
      });
    });

    initNav();
    BabyProfile.mountSwitcher("#profileSwitcher");
    BabyProfile.mountGrowthTimeline("#growthTimeline");
  </script>
  <script src="js/bottom-nav.js"></script>
</body>
</html>
