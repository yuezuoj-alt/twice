<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <link rel="stylesheet" href="css/bottom-nav.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>添加成长记录</title>
  <style>
    :root {
      --bg-page: #f7f2ef;
      --pink-header-from: #fd898a;
      --pink-header-to: #fd9999;
      --pink-accent: #ec7b75;
      --pink-muted: #e8c0b7;
      --pink-nav: #fee0d8;
      --pink-indicator: #fd9394;
      --picker-muted: #ccc;
      --picker-active: #464646;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-page);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }

    /* ===== 背景：成长记录页 ===== */
    .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .pink-header {
      height: 205px;
      background: linear-gradient(180deg, var(--pink-header-from) 0%, var(--pink-header-to) 100%);
      position: relative;
      z-index: 2;
    }

    .header-dim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 3;
      pointer-events: none;
    }
    .profile-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 20px 0;
      position: relative;
      z-index: 4;
    }

    .avatar-small {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: #d89698;
      padding: 2px;
    }

    .avatar-small img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .profile-pill {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 2px 14px 2px 2px;
    }

    .profile-pill .pill-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .profile-pill .avatar-large {
      position: relative;
      width: 36px;
      height: 36px;
    }

    .profile-pill .avatar-large img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-pill .text-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .profile-pill .name { font-size: 14px; font-weight: 600; }
    .profile-pill .birth { font-size: 12px; }

    .tab-bar-wrap {
      position: relative;
      padding: 39px 20px 0;
      z-index: 4;
    }

    .tab-bar-bg {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 39px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 240, 235, 0.6) 30%, rgba(255, 240, 235, 0.8) 100%);
      backdrop-filter: blur(32.5px);
      border: 0.8px solid rgba(255, 255, 255, 0.6);
    }

    .tab-bar {
      position: relative;
      display: flex;
      height: 40px;
      align-items: center;
    }

    .tab-item {
      flex: 1;
      font-size: 16px;
      height: 31px;
      margin: 4.5px 0;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-item.active {
      flex: 0 0 194px;
      margin-left: auto;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.9) 100%);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.1), inset 0 0.5px 0 rgba(255, 255, 255, 0.75);
    }

    .bg-body {
      padding: 16px 20px 120px 54px;
    }

    .bg-timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .bg-timeline-item::before {
      content: "";
      position: absolute;
      left: -29px;
      top: 4px;
      width: 15px;
      height: 15px;
      background: #d3d3d3;
      border-radius: 6px;
    }

    .bg-age {
      font-size: 16px;
      line-height: 23px;
      margin-bottom: 8px;
    }

    .bg-card {
      background: #fff;
      border-radius: 20px;
      height: 105px;
    }

    .bg-add-card {
      background: #fff;
      border-radius: 20px;
      height: 83px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-icon {
      width: 36px;
      height: 36px;
      position: relative;
    }

    .add-icon .bar-h,
    .add-icon .bar-v {
      position: absolute;
      background: #808080;
      border-radius: 20px;
    }

    .add-icon .bar-h {
      width: 36px;
      height: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    .add-icon .bar-v {
      width: 4px;
      height: 36px;
      left: 50%;
      transform: translateX(-50%);
    }

    .body-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 15;
      cursor: pointer;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 102px;
      background: var(--pink-nav);
      display: flex;
      justify-content: space-between;
      padding: 16px 30px 34px;
      z-index: 2;
      pointer-events: none;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50px;
    }

    .nav-item .nav-label {
      font-size: 10px;
      color: var(--pink-muted);
    }

    .nav-item.active .nav-label { color: var(--pink-accent); }

    /* ===== 弹窗 ===== */
    .modal {
      position: absolute;
      left: 50%;
      top: calc(50% - 1px);
      transform: translate(-50%, -50%);
      width: 400px;
      height: 750px;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 53px 0 16px;
    }

    .confirm-btn {
      position: absolute;
      top: 13px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ffcf76;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-size: 20px;
      font-weight: 700;
      color: #464646;
      line-height: 1;
    }

    .confirm-btn:active { opacity: 0.85; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-shrink: 0;
      height: 28px;
    }

    .section-header.date { margin-top: 0; }
    .section-header.height { margin-top: 14px; }
    .section-header.weight { margin-top: 25px; }

    .section-title {
      font-size: 22px;
      color: #000;
    }

    .unit-badge {
      position: relative;
      min-width: 36px;
      height: 20px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .unit-badge::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 0.5px solid #ccc;
      border-radius: 3px;
    }

    .unit-badge span {
      position: relative;
      font-size: 10px;
      letter-spacing: 0.35px;
      color: #000;
      white-space: nowrap;
    }

    /* 垂直滚轮 — 上下灰色数值可见，无遮罩 */
    .wheel-wrap {
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    .wheel-col {
      position: relative;
      height: 100%;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .wheel-col::-webkit-scrollbar { display: none; }

    .wheel-item {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      font-size: 16px;
      font-weight: 600;
      color: #ccc;
      user-select: none;
    }

    .wheel-item.active {
      font-size: 28px;
      color: #464646;
    }

    .date-picker-wrap {
      height: 126px;
      margin-top: 14px;
      flex-shrink: 0;
    }

    /* 日期选区横线 — 固定不随滚轮滚动 */
    .date-picker-lines {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .date-picker-lines .picker-line {
      position: absolute;
      height: 1px;
      background: #ccc;
    }

    .date-picker-lines .picker-line--top { top: calc(50% - 21px); }
    .date-picker-lines .picker-line--bottom { top: calc(50% + 21px); }
    .date-picker-lines .picker-line--year { left: 62px; width: 86px; }
    .date-picker-lines .picker-line--month { left: 178px; width: 65px; }
    .date-picker-lines .picker-line--day { left: 273px; width: 65px; }

    .date-picker {
      display: flex;
      height: 100%;
      padding: 0 62px;
    }

    .date-picker .wheel-col { flex: 1; }
    .date-picker .wheel-col.year { flex: 0 0 86px; }

    /* 身高 */
    .height-picker-wrap {
      height: 224px;
      margin-top: 14px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .height-picker-inner {
      display: flex;
      height: 100%;
      position: relative;
    }

    .height-picker-inner .wheel-col { flex: 1; }

    .height-picker-inner .wheel-item {
      height: 77px;
      font-size: 28px;
      color: #ccc;
    }

    .height-picker-inner .wheel-item.active {
      font-size: 28px;
      color: #464646;
    }

    .height-indicator-line {
      position: absolute;
      right: -40px;
      top: 112px;
      width: 147px;
      height: 4px;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 3;
    }

    .height-indicator-line::before {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      background: var(--pink-indicator);
      border-radius: 2px;
    }

    .height-ruler {
      position: absolute;
      right: -40px;
      top: -44.5px;
      width: 123px;
      height: 312px;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        #ccc 0,
        #ccc 1px,
        transparent 1px,
        transparent 7.7px
      );
      border-right: 1px solid #ccc;
      opacity: 0.85;
    }

    /* 体重 — 下半部分隐藏的环形转盘 */
    .weight-section {
      position: relative;
      height: 250px;
      margin-top: 14px;
      overflow: visible;
      touch-action: pan-x;
      flex-shrink: 0;
      z-index: 2;
    }

    .weight-indicator {
      position: absolute;
      left: 50%;
      top: 103px;
      transform: translateX(-50%);
      width: 4px;
      height: 193px;
      background: var(--pink-indicator);
      border-radius: 2px 2px 0 0;
      z-index: 1;
      pointer-events: none;
    }

    .weight-dial-viewport {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 200px;
      overflow: visible;
      cursor: grab;
      z-index: 3;
    }

    .weight-dial-viewport.dragging { cursor: grabbing; }

    .weight-dial-ring {
      position: absolute;
      left: 50%;
      bottom: -186px;
      width: 372px;
      height: 372px;
      margin-left: -186px;
      transform-origin: 186px 186px;
      will-change: transform;
      z-index: 2;
    }

    .weight-dial-ring.snapping {
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .weight-dial-svg {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .weight-dial-svg line {
      stroke: #ccc;
      stroke-linecap: round;
    }

    .weight-dial-svg line.tick-major {
      stroke-width: 1.5;
    }

    .weight-dial-svg line.tick-mid {
      stroke-width: 1;
    }

    .weight-dial-svg line.tick-minor {
      stroke-width: 0.5;
    }

    .weight-dial-svg text.dial-label {
      font-family: inherit;
      font-size: 28px;
      font-weight: 600;
      fill: #ccc;
    }

    .weight-dial-svg text.dial-label.active {
      fill: #464646;
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
      .modal {
        width: calc(100% - 40px);
        max-width: 400px;
        height: min(750px, calc(100vh - 100px));
      }
    }
  </style>
  <script src="js/load-baby-profile-css.js"></script>
</head>

  <script>
    const ITEM_H = 42;
    const HEIGHT_ITEM_H = 77;

    class VerticalWheel {
      constructor(col, options) {
        this.col = col;
        this.itemHeight = options.itemHeight || ITEM_H;
        this.items = options.items;
        this.defaultIndex = options.defaultIndex || 0;
        this.formatActive = options.formatActive || ((v) => String(v));
        this.formatItem = options.formatItem || ((v) => String(v));
        this.onChange = options.onChange || (() => {});
        this.scrollTimer = null;
        this.build();
        this.bind();
        requestAnimationFrame(() => {
          this.scrollToIndex(this.defaultIndex, false);
          this.updateActive();
        });
      }

      build() {
        const pad = this.getPadding();
        this.col.style.paddingTop = pad + "px";
        this.col.style.paddingBottom = pad + "px";
        this.col.innerHTML = "";
        this.items.forEach((val, i) => {
          const el = document.createElement("div");
          el.className = "wheel-item";
          el.textContent = this.formatItem(val, i);
          this.col.appendChild(el);
        });
      }

      getPadding() {
        const visible = this.col.clientHeight || (this.itemHeight === HEIGHT_ITEM_H ? 224 : 126);
        return Math.max(0, (visible - this.itemHeight) / 2);
      }

      getIndex() {
        const idx = Math.round(this.col.scrollTop / this.itemHeight);
        return Math.max(0, Math.min(this.items.length - 1, idx));
      }

      scrollToIndex(index, smooth = true) {
        this.col.style.scrollBehavior = smooth ? "smooth" : "auto";
        this.col.scrollTop = index * this.itemHeight;
        if (!smooth) this.col.style.scrollBehavior = "smooth";
      }

      updateActive() {
        const idx = this.getIndex();
        this.col.querySelectorAll(".wheel-item").forEach((el, i) => {
          const active = i === idx;
          el.classList.toggle("active", active);
          el.textContent = active
            ? this.formatActive(this.items[i], i)
            : this.formatItem(this.items[i], i);
        });
        this.onChange(this.items[idx], idx);
      }

      snap() {
        this.scrollToIndex(this.getIndex());
        setTimeout(() => this.updateActive(), 100);
      }

      bind() {
        this.col.addEventListener("scroll", () => {
          clearTimeout(this.scrollTimer);
          this.updateActive();
          this.scrollTimer = setTimeout(() => this.snap(), 80);
        });

        this.col.addEventListener("wheel", (e) => {
          e.preventDefault();
          this.col.scrollTop += e.deltaY;
        }, { passive: false });

        this.col.addEventListener("touchend", () => {
          setTimeout(() => this.snap(), 50);
        });
      }

      setItems(items, nextIndex) {
        this.items = items;
        this.defaultIndex = nextIndex;
        this.build();
        this.scrollToIndex(nextIndex, false);
        this.updateActive();
      }
    }

    class DialWheel {
      constructor(viewport, ring, options) {
        this.viewport = viewport;
        this.ring = ring;
        this.min = options.min;
        this.max = options.max;
        this.step = options.step || 0.1;
        this.defaultValue = options.defaultValue;
        this.kgStepAngle = options.kgStepAngle || 20;
        this.stepAngle = this.kgStepAngle / 10;
        this.cx = 186;
        this.cy = 186;
        this.tickOuter = 180;
        this.tickMajorInner = 163;
        this.tickMidInner = 168;
        this.tickMinorInner = 173;
        this.labelRadius = 196;
        this.totalSteps = Math.round((this.max - this.min) / this.step);
        this.minRotation = -this.totalSteps * this.stepAngle;
        this.maxRotation = 0;
        this.index = Math.round((this.defaultValue - this.min) / this.step);
        this.index = Math.max(0, Math.min(this.totalSteps, this.index));
        this.rotation = -this.index * this.stepAngle;
        this.dragging = false;
        this.startX = 0;
        this.startRotation = 0;
        this.labels = [];
        this.build();
        this.bind();
        this.render(false);
      }

      getValue() {
        return Math.round((this.min + this.index * this.step) * 10) / 10;
      }

      clampRotation(rotation) {
        return Math.max(this.minRotation, Math.min(this.maxRotation, rotation));
      }

      stepToAngle(stepIndex) {
        return stepIndex * this.stepAngle - 90;
      }

      polarXY(radius, angleDeg) {
        const rad = (angleDeg * Math.PI) / 180;
        return {
          x: this.cx + radius * Math.cos(rad),
          y: this.cy + radius * Math.sin(rad)
        };
      }

      build() {
        this.ring.innerHTML = "";
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("class", "weight-dial-svg");
        svg.setAttribute("viewBox", "0 0 372 372");

        const tickGroup = document.createElementNS(svgNS, "g");
        tickGroup.setAttribute("class", "dial-ticks");
        const labelGroup = document.createElementNS(svgNS, "g");
        labelGroup.setAttribute("class", "dial-labels");

        for (let i = 0; i <= this.totalSteps; i++) {
          const tenth = i % 10;
          let inner;
          let cls;
          if (tenth === 0) {
            inner = this.tickMajorInner;
            cls = "tick-major";
          } else if (tenth === 5) {
            inner = this.tickMidInner;
            cls = "tick-mid";
          } else {
            inner = this.tickMinorInner;
            cls = "tick-minor";
          }

          const angleDeg = this.stepToAngle(i);
          const innerPt = this.polarXY(inner, angleDeg);
          const outerPt = this.polarXY(this.tickOuter, angleDeg);
          const line = document.createElementNS(svgNS, "line");
          line.setAttribute("x1", innerPt.x.toFixed(2));
          line.setAttribute("y1", innerPt.y.toFixed(2));
          line.setAttribute("x2", outerPt.x.toFixed(2));
          line.setAttribute("y2", outerPt.y.toFixed(2));
          line.setAttribute("class", cls);
          tickGroup.appendChild(line);
        }

        this.labels = [];
        for (let kg = this.min; kg <= this.max; kg += 1) {
          const stepIndex = Math.round((kg - this.min) / this.step);
          const angleDeg = this.stepToAngle(stepIndex);
          const pt = this.polarXY(this.labelRadius, angleDeg);
          const text = document.createElementNS(svgNS, "text");
          text.setAttribute("x", pt.x.toFixed(2));
          text.setAttribute("y", pt.y.toFixed(2));
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          text.setAttribute("class", "dial-label");
          text.setAttribute(
            "transform",
            "rotate(" + (angleDeg + 90).toFixed(2) + " " + pt.x.toFixed(2) + " " + pt.y.toFixed(2) + ")"
          );
          text.textContent = String(Math.round(kg));
          text.dataset.stepIndex = String(stepIndex);
          labelGroup.appendChild(text);
          this.labels.push({ el: text, stepIndex: stepIndex });
        }

        svg.appendChild(tickGroup);
        svg.appendChild(labelGroup);
        this.ring.appendChild(svg);
      }

      indexFromRotation(rotation) {
        return Math.max(
          0,
          Math.min(this.totalSteps, Math.round(-rotation / this.stepAngle))
        );
      }

      updateActiveLabels(activeIndex) {
        this.labels.forEach(function (item) {
          item.el.classList.toggle("active", item.stepIndex === activeIndex);
        });
      }

      render(animate) {
        this.index = this.indexFromRotation(this.rotation);
        this.rotation = -this.index * this.stepAngle;
        this.ring.classList.toggle("snapping", animate);
        this.ring.style.transform = "rotate(" + this.rotation + "deg)";
        this.updateActiveLabels(this.index);
      }

      bind() {
        const self = this;

        const onDown = (x) => {
          self.dragging = true;
          self.startX = x;
          self.startRotation = self.rotation;
          self.viewport.classList.add("dragging");
          self.ring.classList.remove("snapping");
        };

        const onMove = (x) => {
          if (!self.dragging) return;
          const delta = x - self.startX;
          self.rotation = self.clampRotation(self.startRotation + delta * 0.55);
          self.ring.style.transform = "rotate(" + self.rotation + "deg)";
          self.updateActiveLabels(self.indexFromRotation(self.rotation));
        };

        const onUp = () => {
          if (!self.dragging) return;
          self.dragging = false;
          self.viewport.classList.remove("dragging");
          self.render(true);
        };

        this.viewport.addEventListener("mousedown", (e) => {
          e.preventDefault();
          onDown(e.clientX);
        });

        window.addEventListener("mousemove", (e) => onMove(e.clientX));
        window.addEventListener("mouseup", onUp);

        this.viewport.addEventListener("touchstart", (e) => onDown(e.touches[0].clientX), { passive: true });
        this.viewport.addEventListener("touchmove", (e) => onMove(e.touches[0].clientX), { passive: true });
        this.viewport.addEventListener("touchend", onUp);

        this.viewport.addEventListener("wheel", (e) => {
          e.preventDefault();
          const next = self.clampRotation(
            self.rotation + (e.deltaY > 0 ? self.stepAngle * 0.35 : -self.stepAngle * 0.35)
          );
          self.rotation = next;
          self.render(true);
        }, { passive: false });
      }
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function buildDays(year, month) {
      const total = getDaysInMonth(year, month);
      return Array.from({ length: total }, (_, i) => String(i + 1).padStart(2, "0"));
    }

    const years = [2024, 2025, 2026, 2027, 2028];
    const months = Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, "0"));

    const today = SystemTime.getNow();
    let selectedYear = today.getFullYear();
    let selectedMonth = today.getMonth() + 1;
    const todayDay = today.getDate();

    if (!years.includes(selectedYear)) {
      years.push(selectedYear);
      years.sort(function (a, b) { return a - b; });
    }

    const yearWheel = new VerticalWheel(document.getElementById("yearCol"), {
      items: years,
      defaultIndex: Math.max(0, years.indexOf(selectedYear)),
      onChange: (val) => {
        selectedYear = val;
        refreshDays();
      }
    });

    const monthWheel = new VerticalWheel(document.getElementById("monthCol"), {
      items: months,
      defaultIndex: selectedMonth - 1,
      onChange: (val) => {
        selectedMonth = Number(val);
        refreshDays();
      }
    });

    document.getElementById("monthCol").classList.add("month");
    document.getElementById("dayCol").classList.add("day");

    const dayWheel = new VerticalWheel(document.getElementById("dayCol"), {
      items: buildDays(selectedYear, selectedMonth),
      defaultIndex: todayDay - 1
    });

    function refreshDays() {
      const days = buildDays(selectedYear, selectedMonth);
      const prevDay = dayWheel.items[dayWheel.getIndex()];
      let nextIndex = days.indexOf(prevDay);
      if (nextIndex < 0) nextIndex = days.length - 1;
      dayWheel.setItems(days, nextIndex);
    }

    const heights = [];
    for (let h = 100; h >= 50; h -= 0.5) heights.push(h);

    const heightWheel = new VerticalWheel(document.getElementById("heightCol"), {
      items: heights,
      itemHeight: HEIGHT_ITEM_H,
      defaultIndex: 60,
      formatActive: (v) => v.toFixed(1),
      formatItem: (v) => v.toFixed(1)
    });

    const weightDial = new DialWheel(
      document.getElementById("weightDialViewport"),
      document.getElementById("weightDialRing"),
      {
        min: 0,
        max: 15,
        step: 0.1,
        defaultValue: 3.2,
        kgStepAngle: 20
      }
    );

    function saveRecordAndBack() {
      const day = Number(dayWheel.items[dayWheel.getIndex()]);
      const month = selectedMonth;
      const year = selectedYear;
      const height = heightWheel.items[heightWheel.getIndex()];
      const weight = weightDial.getValue();
      const child = BabyProfile.getActiveChild();
      const recordDate = new Date(year, month - 1, day);

      BabyProfile.addGrowthRecord({
        date: year + "-" + String(month).padStart(2, "0") + "-" + String(day).padStart(2, "0"),
        ageLabel: BabyProfile.formatAgeZh(recordDate, child.birth),
        height: height,
        weight: weight
      });
      window.location.href = "成长记录.html";
    }

    function goBack() {
      window.location.href = "成长记录.html";
    }

    document.getElementById("confirmBtn").addEventListener("click", saveRecordAndBack);
    document.getElementById("overlay").addEventListener("click", goBack);
    document.querySelector(".modal").addEventListener("click", function (e) {
      e.stopPropagation();
    });
  </script>
  <script src="js/bottom-nav.js"></script>
</body>
