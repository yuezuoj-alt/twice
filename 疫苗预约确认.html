<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <link rel="stylesheet" href="css/bottom-nav.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>预定内容确认</title>
  <style>
    :root {
      --bg-page: #f7f2ef;
      --header-gradient: linear-gradient(180deg, #fd898a 0%, #fd9999 100%);
      --pink-accent: #ec7b75;
      --pink-primary: #fd898a;
      --pink-progress: #f1a7a8;
      --nav-bg: #fee0d8;
      --text-secondary: #464646;
      --btn-cancel-bg: #c5c5c5;
      --btn-confirm-bg: #fd898a;
      --progress-line: #d9d9d9;
      --divider: #d3d3d3;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-page);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }

    .header-gradient {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 173px;
      background: var(--header-gradient);
      z-index: 0;
    }

    .header-dim {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 173px;
      background: rgba(0, 0, 0, 0.22);
      z-index: 3;
      pointer-events: none;
    }
    .profile-row {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      min-height: 72px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .avatar-small {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #d89698;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-small img { width: 100%; height: 100%; object-fit: cover; }

    .profile-pill {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 2px 14px 2px 2px;
    }

    .profile-pill .pill-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .profile-pill .avatar-large {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .profile-pill .avatar-large img { width: 100%; height: 100%; object-fit: cover; }

    .profile-pill .text-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-size: 14px;
    }

    .profile-pill .name { font-weight: 600; }
    .profile-pill .birth { font-size: 12px; }

    .calendar-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .bg-vaccine-list {
      position: absolute;
      top: 134px;
      left: 0;
      right: 0;
      bottom: 102px;
      padding: 20px 20px 0;
      z-index: 1;
      overflow: hidden;
    }

    .bg-card {
      background: #fff;
      border-radius: 20px;
      min-height: 118px;
      margin-bottom: 14px;
      padding: 12px 14px;
      opacity: 0.95;
    }

    .bg-card .title {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .content-overlay {
      position: absolute;
      top: 173px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    .modal-stack {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 264px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12.5px);
      -webkit-backdrop-filter: blur(12.5px);
      border-radius: 15px;
      overflow: hidden;
    }

    .card-progress {
      padding: 19px 20px 16px;
      text-align: center;
    }

    .modal-title {
      font-size: 16px;
      color: #000;
      margin-bottom: 14px;
    }

    .progress-bar {
      position: relative;
      height: 7px;
      margin: 0 10px;
    }

    .progress-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 2px;
      height: 3px;
      background: var(--progress-line);
      border-radius: 2px;
    }

    .progress-line-fill {
      position: absolute;
      left: 0;
      top: 2px;
      height: 3px;
      width: 100%;
      background: var(--pink-progress);
      border-radius: 2px;
      z-index: 1;
    }

    .progress-dots {
      position: relative;
      display: flex;
      justify-content: space-between;
      padding: 0 26px;
    }

    .progress-dot {
      width: 7px;
      height: 7px;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-dot img {
      width: 7px;
      height: 7px;
      display: block;
    }

    .card-confirm {
      padding: 0 0 24px;
    }

    .confirm-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
    }

    .confirm-row.profile-row-inner {
      align-items: flex-start;
      padding-top: 20px;
      padding-bottom: 20px;
    }

    .confirm-row:active { opacity: 0.85; }

    .confirm-row .baby-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .confirm-row .baby-text .name {
      font-size: 16px;
      font-weight: 500;
      color: #000;
      margin-bottom: 4px;
    }

    .confirm-row .baby-text .birth {
      font-size: 14px;
      color: #000;
    }

    .confirm-row .label {
      font-size: 16px;
      color: #000;
      width: 82px;
      flex-shrink: 0;
    }

    .confirm-row .value {
      flex: 1;
      font-size: 14px;
      color: #000;
      min-width: 0;
    }

    .confirm-row .arrow {
      width: 7px;
      height: 13px;
      flex-shrink: 0;
    }

    .confirm-divider {
      height: 1px;
      background: var(--divider);
      margin: 0 20px;
    }

    .modal-footer {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      padding: 0 22px;
    }

    .modal-footer button {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 38.5px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-cancel {
      background: var(--btn-cancel-bg);
      color: var(--text-secondary);
    }

    .btn-confirm {
      background: var(--btn-confirm-bg);
      color: #fff;
    }

    .btn-cancel:active,
    .btn-confirm:active { opacity: 0.88; }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 102px;
      background: var(--nav-bg);
      backdrop-filter: blur(11.45px);
      display: flex;
      justify-content: space-between;
      padding: 16px 30px 34px;
      z-index: 4;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50px;
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
    }

    .nav-item .nav-icon {
      width: 29px;
      height: 29px;
      margin-bottom: 4px;
    }

        .nav-item .nav-label {
      font-size: 10px;
      color: #979797;
    }

    .nav-item.active .nav-label { color: var(--pink-accent); }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
  <script src="js/load-baby-profile-css.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header-gradient"></div>
    <div class="header-dim"></div>

    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="dynamic-island" aria-hidden="true"></div>
      <div class="levels"><img src="images/Levels.png" alt="" class="levels-strip" /></div>
    </div>

    <div class="profile-row">
      <div class="profile-info">
        <div class="avatar-small">
          <img src="images/avatar-xia.png" alt="" />
        </div>
        <div class="profile-pill">
          
          <div class="avatar-large">
            <img src="images/avatar-xia.png" alt="" />
          </div>
          <div class="text-wrap">
            <span class="name">皮皮虾</span>
            <span class="birth">2026年4月8号出生</span>
          </div>
        </div>
      </div>
      <button class="calendar-btn" type="button" aria-label="日历"><img src="images/日历.png" alt="" /></button>
    </div>

    <div class="bg-vaccine-list" aria-hidden="true">
      <div class="bg-card"><div class="title">乙肝疫苗</div></div>
    </div>

    <div class="content-overlay" id="overlay"></div>

    <div class="modal-stack" role="dialog" aria-labelledby="modalTitle">
      <div class="card card-progress">
        <h2 class="modal-title" id="modalTitle">预定内容确认</h2>
        <div class="progress-bar">
          <div class="progress-line"></div>
          <div class="progress-line-fill"></div>
          <div class="progress-dots">
            <span class="progress-dot"></span>
            <span class="progress-dot"></span>
            <span class="progress-dot"></span>
          </div>
        </div>
      </div>

      <div class="card card-confirm">
        <button class="confirm-row profile-row-inner" type="button">
          <img class="baby-avatar" src="images/avatar-xia.png" alt="" />
          <div class="baby-text">
            <div class="name">皮皮虾</div>
            <div class="birth">2026年4月8号出生</div>
          </div>
          <img class="arrow" src="images/后一个.png" alt="" />
        </button>
        <div class="confirm-divider"></div>
        <button class="confirm-row" type="button">
          <span class="label">接种疫苗</span>
          <span class="value" id="vaccineValue">脊髓灰质炎疫苗</span>
          <img class="arrow" src="images/后一个.png" alt="" />
        </button>
        <div class="confirm-divider"></div>
        <button class="confirm-row" type="button">
          <span class="label">接种时间</span>
          <span class="value" id="dateValue">2026.05.08</span>
          <img class="arrow" src="images/后一个.png" alt="" />
        </button>
        <div class="confirm-divider"></div>
        <button class="confirm-row" type="button">
          <span class="label">接种门诊</span>
          <span class="value" id="clinicValue">红凌路预防接种站</span>
          <img class="arrow" src="images/后一个.png" alt="" />
        </button>
        <div class="confirm-divider"></div>
        <button class="confirm-row" type="button">
          <span class="label">添加备注</span>
          <span class="value" id="remarkValue">带一条防风外套</span>
          <img class="arrow" src="images/后一个.png" alt="" />
        </button>
        <div class="modal-footer">
          <button class="btn-cancel" type="button" id="btnCancel">取消</button>
          <button class="btn-confirm" type="button" id="btnConfirm">确定</button>
        </div>
      </div>
    </div>

        <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item active" data-nav="appointment" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">预约</span></button>
      <button class="nav-item" data-nav="schedule" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">接种时间表</span></button>
      <button class="nav-item" data-nav="growth" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">成长曲线</span></button>
      <button class="nav-item" data-nav="profile" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">我的</span></button>
    </nav>
  </div>

  <script src="js/system-time.js"></script>
  <script src="js/baby-profile.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const vaccineName = params.get("vaccine") || "脊髓灰质炎疫苗";
    const doseInfo = params.get("dose") || "";
    const dateInfo = params.get("date") || "2026-05-08";
    const clinicName = params.get("clinic") || "红凌路预防接种站";
    const remark = params.get("remark") || "带一条防风外套";

    function formatDateDisplay(dateStr) {
      const parts = dateStr.split("-");
      if (parts.length === 3) {
        return `${parts[0]}.${parts[1]}.${parts[2]}`;
      }
      return dateStr.replace(/-/g, ".");
    }

    document.getElementById("vaccineValue").textContent = vaccineName;
    document.getElementById("dateValue").textContent = formatDateDisplay(dateInfo);
    document.getElementById("clinicValue").textContent = clinicName;
    document.getElementById("remarkValue").textContent = remark;

    function goHome() {
      window.location.href = "index.html";
    }

    document.getElementById("btnCancel").addEventListener("click", goHome);
    document.getElementById("overlay").addEventListener("click", goHome);

    document.getElementById("btnConfirm").addEventListener("click", () => {
      if (vaccineName && doseInfo) {
        BabyProfile.setBookedDose(vaccineName, doseInfo, {
          date: dateInfo,
          clinic: clinicName,
          remark: remark
        });
      }
      goHome();
    });
  </script>
  <script src="js/bottom-nav.js"></script>
</body>
</html>
