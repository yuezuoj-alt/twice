<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>疫苗日历</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(0deg, #fff 43.75%, #fd9999 89.42%, #fd898a 100%);
      --text-primary: #464646;
      --text-muted: #808080;
      --text-next: #808080;
      --marker-pink: #ffcfcf;
      --marker-blue: #58aefb;
      --marker-gray: #dae3e8;
      --marker-light-pink: #e9dada;
      --card-pink: #fceeee;
      --card-blue: #e5f0ff;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-gradient);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      align-items: center;
      padding: 4px 20px 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .back-btn img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
    }

    .back-btn:active {
      opacity: 0.85;
    }

    .month-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 4px 20px 16px;
      flex-shrink: 0;
    }

    .month-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
      flex-shrink: 0;
    }

    .month-nav-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .month-nav-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .month-nav-btn img {
      width: 24px;
      height: 56px;
      object-fit: contain;
      display: block;
    }

    .month-nav-btn:active {
      opacity: 0.7;
    }

    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 32px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .scroll-body::-webkit-scrollbar {
      display: none;
    }

    .calendar-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.6) 0%, #fffdfd 100%);
      border: 0.8px solid #fff;
      border-radius: 24px;
      padding: 20px 16px 16px;
      margin-bottom: 20px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 12px;
    }

    .weekdays span {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      row-gap: 14px;
    }

    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 52px;
      cursor: pointer;
      padding: 2px 0;
    }

    .day-cell.other-month .day-num {
      color: var(--text-muted);
    }

    .day-num {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      border-radius: 50%;
      margin-bottom: 6px;
    }

    .day-cell.selected .day-num {
      background: var(--text-primary);
      color: #fff;
    }

    .day-markers {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 34px;
      min-height: 16px;
    }

    .day-markers .bar {
      height: 7px;
      border-radius: 5.5px;
      width: 100%;
    }

    .day-markers .bar.pink { background: var(--marker-pink); }
    .day-markers .bar.blue { background: var(--marker-blue); }
    .day-markers .bar.gray { background: var(--marker-gray); }
    .day-markers .bar.light-pink { background: var(--marker-light-pink); }

    .appointments-section {
      margin-top: 4px;
    }

    .appointments-date {
      font-size: 16px;
      font-weight: 500;
      color: #000;
      letter-spacing: 0.35px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .appointment-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: 24px;
      margin-bottom: 12px;
      min-height: 80px;
    }

    .appointment-card.pink { background: var(--card-pink); }
    .appointment-card.blue { background: var(--card-blue); }

    .appointment-card .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #fff;
      overflow: hidden;
      flex-shrink: 0;
    }

    .appointment-card .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .appointment-card .info {
      flex: 1;
      min-width: 0;
    }

    .appointment-card .name {
      font-size: 14px;
      color: #2b2b2b;
      margin-bottom: 8px;
    }

    .appointment-card .vaccine-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9.5px;
      color: var(--text-primary);
    }

    .appointment-card .syringe-icon {
      width: 12px;
      height: 12px;
      opacity: 0.6;
    }

    .appointment-card .dose-icon {
      width: 10px;
      height: 10px;
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="dynamic-island" aria-hidden="true"></div>
      <div class="levels"><img src="images/Levels.png" alt="" class="levels-strip" /></div>
    </div>

    <div class="top-bar">
      <button class="back-btn" type="button" id="backBtn" aria-label="返回">
        <img src="images/返回.png" alt="" />
      </button>
    </div>

    <div class="month-header">
      <h1 class="month-title" id="monthTitle">2026.04</h1>
      <div class="month-nav-group">
        <button class="month-nav-btn prev" type="button" id="prevMonth" aria-label="上个月">
          <img src="images/前一个.png" alt="" />
        </button>
        <button class="month-nav-btn next" type="button" id="nextMonth" aria-label="下个月">
          <img src="images/后一个.png" alt="" />
        </button>
      </div>
    </div>

    <div class="scroll-body">
      <div class="calendar-card">
        <div class="weekdays">
          <span>周日</span><span>周一</span><span>周二</span><span>周三</span>
          <span>周四</span><span>周五</span><span>周六</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <section class="appointments-section">
        <h2 class="appointments-date" id="appointmentsDate">2026.4.17</h2>
        <div id="appointmentsList"></div>
      </section>
    </div>
  </div>

  <script src="js/system-time.js"></script>
  <script src="js/baby-profile.js"></script>
  <script>
    const ASSETS = {
      syringe: "images/针头.png",
      bookedBall: "images/预约球.png"
    };

    const now =
      typeof SystemTime !== "undefined" && SystemTime.getNow
        ? SystemTime.getNow()
        : new Date();

    let viewYear = now.getFullYear();
    let viewMonth = now.getMonth();
    let selectedYear = viewYear;
    let selectedMonth = viewMonth;
    let selectedDay = 1;

    function formatMonthTitle(y, m) {
      const mm = String(m + 1).padStart(2, "0");
      return `${y}.${mm}`;
    }

    function formatAppointmentsDate(y, m, d) {
      return `${y}.${m + 1}.${d}`;
    }

    function pickInitialSelectedDay(y, m) {
      const markers = BabyProfile.getCalendarDayMarkers(y, m);
      const days = Object.keys(markers)
        .map(function (d) {
          return parseInt(d, 10);
        })
        .sort(function (a, b) {
          return a - b;
        });
      if (days.length) return days[0];
      if (now.getFullYear() === y && now.getMonth() === m) return now.getDate();
      return 1;
    }

    selectedDay = pickInitialSelectedDay(selectedYear, selectedMonth);

    function getMarkers(y, m, day, isCurrentMonth) {
      if (!isCurrentMonth) return [];
      const monthMarkers = BabyProfile.getCalendarDayMarkers(y, m);
      return monthMarkers[day] || [];
    }

    function renderMarkers(markers) {
      if (!markers.length) {
        return '<div class="day-markers"></div>';
      }
      const bars = markers.map((type) => `<span class="bar ${type}"></span>`).join("");
      return `<div class="day-markers">${bars}</div>`;
    }

    function renderCalendar() {
      document.getElementById("monthTitle").textContent = formatMonthTitle(viewYear, viewMonth);

      const grid = document.getElementById("calendarGrid");
      const first = new Date(viewYear, viewMonth, 1);
      const startWeekday = first.getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();

      grid.innerHTML = "";

      for (let i = 0; i < startWeekday; i++) {
        const day = prevMonthDays - startWeekday + i + 1;
        const cell = document.createElement("div");
        cell.className = "day-cell other-month";
        cell.innerHTML = `<span class="day-num">${day}</span>${renderMarkers([])}`;
        grid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div");
        const isSelected =
          viewYear === selectedYear &&
          viewMonth === selectedMonth &&
          day === selectedDay;
        cell.className = `day-cell${isSelected ? " selected" : ""}`;
        const markers = getMarkers(viewYear, viewMonth, day, true);
        cell.innerHTML = `<span class="day-num">${day}</span>${renderMarkers(markers)}`;
        cell.addEventListener("click", () => {
          selectedYear = viewYear;
          selectedMonth = viewMonth;
          selectedDay = day;
          renderCalendar();
          renderAppointments();
        });
        grid.appendChild(cell);
      }

      const totalCells = startWeekday + daysInMonth;
      const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let day = 1; day <= trailing; day++) {
        const cell = document.createElement("div");
        cell.className = "day-cell other-month";
        cell.innerHTML = `<span class="day-num">${day}</span>${renderMarkers([])}`;
        grid.appendChild(cell);
      }
    }

    function renderAppointments() {
      document.getElementById("appointmentsDate").textContent =
        formatAppointmentsDate(selectedYear, selectedMonth, selectedDay);

      const list = BabyProfile.getAppointmentsForDate(
        selectedYear,
        selectedMonth,
        selectedDay
      );
      const container = document.getElementById("appointmentsList");

      if (!list.length) {
        container.innerHTML = "";
        return;
      }

      container.innerHTML = list
        .map(function (apt) {
          return `
        <article class="appointment-card ${apt.theme}">
          <div class="avatar">
            <img src="${apt.avatar}" alt="" />
          </div>
          <div class="info">
            <p class="name">${apt.childName}</p>
            <div class="vaccine-row">
              <img class="syringe-icon" src="${ASSETS.syringe}" alt="" />
              <span>${apt.vaccine}</span>
              <img class="dose-icon" src="${ASSETS.bookedBall}" alt="第${apt.dose}剂" />
            </div>
          </div>
        </article>
      `;
        })
        .join("");
    }

    function refreshCalendar() {
      renderCalendar();
      renderAppointments();
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    document.getElementById("prevMonth").addEventListener("click", () => {
      viewMonth -= 1;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear -= 1;
      }
      renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      viewMonth += 1;
      if (viewMonth > 11) {
        viewMonth = 0;
        viewYear += 1;
      }
      renderCalendar();
    });

    if (typeof BabyProfile !== "undefined" && BabyProfile.subscribe) {
      BabyProfile.subscribe(refreshCalendar);
    }
    window.addEventListener("storage", function (e) {
      if (e.key === "babyProfileChildData" || e.key === "babyProfileActiveChild") {
        refreshCalendar();
      }
    });

    refreshCalendar();
  </script>
</body>
</html>
