<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="css/status-bar.css" />
  <link rel="stylesheet" href="css/bottom-nav.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>接种门诊</title>
  <style>
    :root {
      --bg-page: #f7f2ef;
      --header-gradient: linear-gradient(180deg, #fd898a 0%, #fd9999 100%);
      --pink-accent: #ec7b75;
      --pink-primary: #fd898a;
      --pink-progress: #f1a7a8;
      --nav-bg: #fee0d8;
      --text-secondary: #464646;
      --text-muted: #808080;
      --btn-cancel-bg: #c5c5c5;
      --btn-next-bg: #fd898a;
      --progress-line: #d9d9d9;
      --divider: #d3d3d3;
      --phone-w: 440px;
      --phone-h: 956px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4e2;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      padding: 24px 12px;
    }

    .phone {
      width: var(--phone-w);
      height: var(--phone-h);
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: var(--bg-page);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.18);
    }

    .header-gradient {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 173px;
      background: var(--header-gradient);
      z-index: 0;
    }

    .header-dim {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 173px;
      background: rgba(0, 0, 0, 0.22);
      z-index: 3;
      pointer-events: none;
    }
    .profile-row {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      min-height: 72px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .avatar-small {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #d89698;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar-small img { width: 100%; height: 100%; object-fit: cover; }

    .profile-pill {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 2px 14px 2px 2px;
    }

    .profile-pill .pill-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .profile-pill .avatar-large {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .profile-pill .avatar-large img { width: 100%; height: 100%; object-fit: cover; }

    .profile-pill .text-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-size: 14px;
    }

    .profile-pill .name { font-weight: 600; }
    .profile-pill .birth { font-size: 12px; }

    .calendar-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .bg-vaccine-list {
      position: absolute;
      top: 134px;
      left: 0;
      right: 0;
      bottom: 102px;
      padding: 20px 20px 0;
      z-index: 1;
      overflow: hidden;
    }

    .bg-card {
      background: #fff;
      border-radius: 20px;
      min-height: 118px;
      margin-bottom: 14px;
      padding: 12px 14px;
      opacity: 0.95;
    }

    .bg-card .title {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .bg-card .placeholder {
      height: 48px;
      background: #f5f5f5;
      border-radius: 24px;
      width: 48px;
      display: inline-block;
      margin-right: 12px;
    }

    .content-overlay {
      position: absolute;
      top: 173px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    .modal-stack {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 264px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12.5px);
      -webkit-backdrop-filter: blur(12.5px);
      border-radius: 15px;
      overflow: hidden;
    }

    .card-progress {
      padding: 19px 20px 16px;
      text-align: center;
    }

    .modal-title {
      font-size: 16px;
      color: #000;
      margin-bottom: 14px;
    }

    .modal-sub-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: none;
    }

    .modal-sub-info.visible { display: block; }

    .progress-bar {
      position: relative;
      height: 7px;
      margin: 0 10px;
    }

    .progress-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 2px;
      height: 3px;
      background: var(--progress-line);
      border-radius: 2px;
    }

    .progress-line-fill {
      position: absolute;
      left: 0;
      top: 2px;
      height: 3px;
      width: 50%;
      background: var(--pink-progress);
      border-radius: 2px;
      z-index: 1;
    }

    .progress-dots {
      position: relative;
      display: flex;
      justify-content: space-between;
      padding: 0 26px;
    }

    .progress-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d9d9d9;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-dot img {
      width: 7px;
      height: 7px;
      display: block;
    }

    .progress-dot.active {
      background: #ec7b75;
    }

    .card-clinic {
      padding: 0 0 24px;
    }

    .clinic-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 20px 20px 16px;
    }

    .clinic-row .row-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      object-fit: contain;
      margin-top: 2px;
    }

    .clinic-row .row-text {
      flex: 1;
      min-width: 0;
    }

    .clinic-row .row-title {
      font-size: 16px;
      color: #000;
      margin-bottom: 6px;
    }

    .clinic-row .row-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .clinic-row .row-arrow {
      width: 7px;
      height: 13px;
      flex-shrink: 0;
      margin-top: 8px;
    }

    .clinic-row.clickable {
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }

    .clinic-row.clickable:active { opacity: 0.85; }

    .clinic-divider {
      height: 1px;
      background: var(--divider);
      margin: 0 20px;
    }

    .modal-footer {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      padding: 0 20px;
    }

    .modal-footer button {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 38.5px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .btn-cancel { background: var(--btn-cancel-bg); }
    .btn-next { background: var(--btn-next-bg); }

    .btn-cancel:active,
    .btn-next:active { opacity: 0.88; }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 102px;
      background: var(--nav-bg);
      backdrop-filter: blur(11.45px);
      display: flex;
      justify-content: space-between;
      padding: 16px 30px 34px;
      z-index: 4;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50px;
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
    }

    .nav-item .nav-icon {
      width: 29px;
      height: 29px;
      margin-bottom: 4px;
    }

        .nav-item .nav-label {
      font-size: 10px;
      color: #979797;
    }

    .nav-item.active .nav-label {
      color: var(--pink-accent);
    }

    @media (max-width: 480px) {
      body { padding: 0; }
      .phone {
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
  <script src="js/load-baby-profile-css.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header-gradient"></div>
    <div class="header-dim"></div>

    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="dynamic-island" aria-hidden="true"></div>
      <div class="levels"><img src="images/Levels.png" alt="" class="levels-strip" /></div>
    </div>

    <div class="profile-row">
      <div class="profile-info" id="profileSwitcher"></div>
      <button class="calendar-btn" type="button" aria-label="日历"><img src="images/日历.png" alt="" /></button>
    </div>

    <div class="bg-vaccine-list" aria-hidden="true">
      <div class="bg-card"><div class="title">乙肝疫苗</div><span class="placeholder"></span><span class="placeholder"></span></div>
      <div class="bg-card"><div class="title">百白破疫苗</div><span class="placeholder"></span><span class="placeholder"></span></div>
      <div class="bg-card"><div class="title">A群脑流疫苗</div><span class="placeholder"></span></div>
    </div>

    <div class="content-overlay" id="overlay"></div>

    <div class="modal-stack" role="dialog" aria-labelledby="modalTitle">
      <div class="card card-progress">
        <h2 class="modal-title" id="modalTitle">接种门诊</h2>
        <div class="progress-bar">
          <div class="progress-line"></div>
          <div class="progress-line-fill"></div>
          <div class="progress-dots">
            <span class="progress-dot active"></span>
            <span class="progress-dot active"></span>
            <span class="progress-dot"></span>
          </div>
        </div>
      </div>

      <div class="card card-clinic">
        <div class="clinic-row clickable" id="clinicSelectRow" role="button" tabindex="0">
          <img class="row-icon" src="images/接种门诊.png" alt="" />
          <div class="row-text">
            <div class="row-title">接种门诊</div>
            <div class="row-sub" id="clinicName">红凌路预防接种站</div>
          </div>
          <img class="row-arrow" src="images/后一个.png" alt="" />
        </div>
        <div class="clinic-divider"></div>
        <div class="clinic-row">
          <img class="row-icon" src="images/详细地址.png" alt="" />
          <div class="row-text">
            <div class="row-title">详细地址</div>
            <div class="row-sub">西岗区高尔基路188-194号</div>
          </div>
        </div>
        <div class="clinic-divider"></div>
        <div class="clinic-row">
          <img class="row-icon" src="images/营业时间.png" alt="" />
          <div class="row-text">
            <div class="row-title">营业时间</div>
            <div class="row-sub">8:00-11:00&nbsp;&nbsp;13:00-17:00</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" type="button" id="btnCancel">取消</button>
          <button class="btn-next" type="button" id="btnNext">下一步</button>
        </div>
      </div>
    </div>

        <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item active" data-nav="appointment" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">预约</span></button>
      <button class="nav-item" data-nav="schedule" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">接种时间表</span></button>
      <button class="nav-item" data-nav="growth" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">成长曲线</span></button>
      <button class="nav-item" data-nav="profile" type="button"><span class="nav-icon"><img src="" alt="" /></span><span class="nav-label">我的</span></button>
    </nav>
  </div>

  <script src="js/system-time.js"></script>
  <script src="js/baby-profile.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const vaccineName = params.get("vaccine") || "乙肝疫苗";
    const doseInfo = params.get("dose") || "";
    const dateInfo = params.get("date") || "";
    const clinicName = params.get("clinic") || "红凌路预防接种站";

    document.getElementById("clinicName").textContent = clinicName;

    function goToClinicSelect() {
      const nextParams = new URLSearchParams({
        vaccine: vaccineName,
        dose: doseInfo,
        date: dateInfo,
        clinic: clinicName
      });
      window.location.href = `疫苗预约门诊选择.html?${nextParams.toString()}`;
    }

    function goNextStep() {
      const nextParams = new URLSearchParams({
        vaccine: vaccineName,
        dose: doseInfo,
        date: dateInfo,
        clinic: clinicName,
        remark: "带一条防风外套"
      });
      window.location.href = `疫苗预约确认.html?${nextParams.toString()}`;
    }

    function goBack() {
      const backParams = new URLSearchParams({ vaccine: vaccineName, dose: doseInfo });
      window.location.href = `疫苗预约时间.html?${backParams.toString()}`;
    }

    function goHome() {
      window.location.href = "index.html";
    }

    document.getElementById("btnCancel").addEventListener("click", goHome);
    document.getElementById("overlay").addEventListener("click", goHome);
    document.getElementById("clinicSelectRow").addEventListener("click", goToClinicSelect);
    document.getElementById("btnNext").addEventListener("click", goNextStep);
    BabyProfile.mountSwitcher("#profileSwitcher");
  </script>
  <script src="js/bottom-nav.js"></script>
</body>
</html>
